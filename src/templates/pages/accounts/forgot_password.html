{% extends 'layout/base.html' %}
{% load static %}

{% block title %}Forgot password{% endblock %}

{% block extra_css %}
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/utils.js' %}" defer></script>
    <script src="{% static 'js/pages/mock_passwort_reset.js' %}" defer></script>
{% endblock %}


{% block body_content %}

    <!-- Main Content -->
    <main class="auth-page-wrapper">
        <div class="auth-background">
            <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
        </div>
        <div class="auth-form-container">
            <div class="auth-container auth-container--forgot-password">
                <form class="auth-form" id="forgot-password-form" method="post" data-forgot-password-url="{% url 'accounts:forgot-password' %}" data-login-url="{% url 'accounts:login' %}">
                    <div class="InputField">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="Input" placeholder="Value" required>
                    </div>

                    <div class="ButtonGroup ButtonGroup--center">
                        <a href="{% url 'accounts:login' %}" class="button button--cancel">Cancel</a>
                        <button type="submit" class="button button--primary">Reset Password</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Message -->
    <div id="toast" class="toast"></div>

    </main>

{% endblock %}
