<div class="active-filters-container active-filters-bar" id="activeFiltersContainer">
  <div class="active-filters-header" id="activeFiltersHeader">
    <div class="active-filters-header__left">
      <i class="fas fa-filter active-filters-header__icon" aria-hidden="true"></i>
      <span class="active-filters-header__title">Active Filters</span>
      <span class="active-filters-count" id="activeFiltersCount">0</span>
    </div>
    <div class="active-filters-header__actions">
      <button type="button" class="active-filters-clear-btn button button--cancel"
              id="clearAllFilters" style="display: none;">
        <i class="fas fa-times-circle" aria-hidden="true"></i>
        <span>Clear All</span>
      </button>
      <button type="button" class="active-filters-toggle-btn" id="toggleActiveFilters" aria-label="Toggle filters">
        <i class="fas fa-chevron-up" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div class="active-filters-content" id="activeFiltersContent">
    <!-- Gender Filters -->
    <div class="filter-group" id="genderFiltersGroup" style="display: none;">
      <div class="filter-group-header">
        <span class="filter-group-title">
          <i class="fas fa-venus-mars" aria-hidden="true"></i>Gender
        </span>
        <button type="button" class="filter-group-clear" data-clear-group="gender" aria-label="Clear gender">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="filter-tags" id="genderFilterTags"></div>
    </div>

    <!-- Season Filters -->
    <div class="filter-group" id="seasonFiltersGroup" style="display: none;">
      <div class="filter-group-header">
        <span class="filter-group-title">
          <i class="fas fa-sun" aria-hidden="true"></i>Season
        </span>
        <button type="button" class="filter-group-clear" data-clear-group="season" aria-label="Clear season">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="filter-tags" id="seasonFilterTags"></div>
    </div>

    <!-- Availability Filters -->
    <div class="filter-group" id="availabilityFiltersGroup" style="display: none;">
      <div class="filter-group-header">
        <span class="filter-group-title">
          <i class="fas fa-box" aria-hidden="true"></i>Availability
        </span>
        <button type="button" class="filter-group-clear" data-clear-group="availability" aria-label="Clear availability">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="filter-tags" id="availabilityFilterTags"></div>
    </div>

    <!-- Discount Filters -->
    <div class="filter-group" id="discountFiltersGroup" style="display: none;">
      <div class="filter-group-header">
        <span class="filter-group-title">
          <i class="fas fa-percentage" aria-hidden="true"></i>Discount
        </span>
        <button type="button" class="filter-group-clear" data-clear-group="discount" aria-label="Clear discount">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="filter-tags" id="discountFilterTags"></div>
    </div>

    <!-- Price Filters -->
    <div class="filter-group" id="priceFiltersGroup" style="display: none;">
      <div class="filter-group-header">
        <span class="filter-group-title">
          <i class="fas fa-dollar-sign" aria-hidden="true"></i>Price
        </span>
        <button type="button" class="filter-group-clear" data-clear-group="price" aria-label="Clear price">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="filter-tags" id="priceFilterTags"></div>
    </div>
  </div>
</div>
